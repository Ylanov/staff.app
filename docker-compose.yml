services:
  db:
    image: postgres:15-alpine
    container_name: staff_db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: staff_db

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d staff_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - backend

  web:
    build: .
    container_name: staff_web
    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432

    depends_on:
      db:
        condition: service_healthy

    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 1
      -b 0.0.0.0:8000

    volumes:
      - .:/code   # ← оставь для dev, убери для production

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: staff_nginx
    restart: always

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      web:
        condition: service_healthy

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./static:/code/static:ro

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pgdata: